<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Porra Mundial 2026 - Edición Manual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --secondary: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .match-row:nth-child(even) { background-color: #f1f5f966; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .flag-icon {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .group-card { border-top: 6px solid var(--group-color); }
        
        @media print {
            .no-print { display: none !important; }
            .group-card { break-inside: avoid; margin-bottom: 20px; }
            body { background: white; }
        }

        .input-filled { background-color: #ecfdf5 !important; border-color: #10b981 !important; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Header -->
    <header class="bg-slate-900 text-white py-8 px-4 no-print shadow-2xl relative overflow-hidden">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-extrabold tracking-tighter italic uppercase">Polla Mundial <span class="text-emerald-400">2026</span></h1>
                <p class="text-slate-400 font-medium mt-1">Pronostica los 72 partidos de la fase de grupos</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                    <span class="block text-xs font-bold text-slate-500 uppercase">Progreso</span>
                    <span id="progress-text" class="text-xl font-black text-emerald-400">0 / 72</span>
                </div>
            </div>
        </div>
        <div class="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div id="capture-area">
            <!-- Título exclusivo para PDF -->
            <div class="hidden print:block text-center mb-8">
                <h1 class="text-3xl font-black uppercase text-slate-900">Mis Pronósticos Mundial 2026</h1>
                <p class="text-slate-500">Generado el <span id="pdf-date"></span></p>
            </div>

            <!-- Datos del Usuario -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                <h2 class="text-lg font-bold flex items-center gap-2 mb-6 uppercase tracking-wider text-slate-700">
                    <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 1. Datos del Participante
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Nombre del Guerrero/a</label>
                        <input type="text" id="p-name" placeholder="Tu nombre" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">WhatsApp de contacto</label>
                        <input type="tel" id="p-phone" placeholder="Ej. +57 300..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-semibold">
                    </div>
                </div>
            </section>

            <!-- Cuadro de Honor -->
            <section class="mb-12">
                <h2 class="text-lg font-bold flex items-center gap-2 mb-6 uppercase tracking-wider text-slate-700">
                    <span class="w-2 h-6 bg-amber-500 rounded-full"></span> 2. Cuadro de Honor (Predicción Final)
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-gradient-to-br from-amber-50 to-white p-5 rounded-2xl border border-amber-100 shadow-sm relative overflow-hidden">
                        <div class="relative z-10">
                            <span class="text-[10px] font-black text-amber-600 uppercase">Campeón 🥇</span>
                            <select id="h-1" class="h-select w-full mt-2 p-3 bg-white/80 rounded-xl border border-amber-200 font-bold text-slate-800 outline-none"></select>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-slate-50 to-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div class="relative z-10">
                            <span class="text-[10px] font-black text-slate-500 uppercase">Subcampeón 🥈</span>
                            <select id="h-2" class="h-select w-full mt-2 p-3 bg-white/80 rounded-xl border border-slate-200 font-bold text-slate-800 outline-none"></select>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-orange-50 to-white p-5 rounded-2xl border border-orange-100 shadow-sm relative overflow-hidden">
                        <div class="relative z-10">
                            <span class="text-[10px] font-black text-orange-600 uppercase">Tercer Lugar 🥉</span>
                            <select id="h-3" class="h-select w-full mt-2 p-3 bg-white/80 rounded-xl border border-orange-200 font-bold text-slate-800 outline-none"></select>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-blue-50 to-white p-5 rounded-2xl border border-blue-100 shadow-sm relative overflow-hidden">
                        <div class="relative z-10">
                            <span class="text-[10px] font-black text-blue-600 uppercase">Cuarto Lugar 🏅</span>
                            <select id="h-4" class="h-select w-full mt-2 p-3 bg-white/80 rounded-xl border border-blue-200 font-bold text-slate-800 outline-none"></select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Grupos -->
            <section>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-6 uppercase tracking-wider text-slate-700">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> 3. Pronóstico Fase de Grupos
                </h2>
                <div id="groups-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    <!-- Los grupos se cargan dinámicamente aquí -->
                </div>
            </section>
        </div>

        <!-- Acciones Flotantes -->
        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 no-print z-50 w-full max-w-md px-4">
            <button id="clear-btn" class="bg-white text-red-500 border border-red-100 p-4 rounded-2xl shadow-xl hover:bg-red-50 transition-all font-bold" title="Limpiar todo">
                🗑️
            </button>
            <button id="pdf-btn" class="flex-grow bg-emerald-600 text-white py-4 px-8 rounded-2xl shadow-xl hover:bg-emerald-700 hover:scale-[1.02] transition-all font-black text-lg flex items-center justify-center gap-3">
                <span>DESCARGAR PDF</span>

            </button>
        </div>
    </main>

        // LÓGICA DE RENDERING Y FUNCIONALIDAD
        function init() {
            const grid = document.getElementById('groups-grid');
            groupConfigs.forEach(group => {
                const card = document.createElement('article');
                card.className = 'group-card bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden';
                card.style.setProperty('--group-color', group.color);
                
                let matchesHtml = group.matches.map((m, i) => `
                    <tr class="match-row border-b border-slate-50 last:border-0">
                        <td class="p-3">
                            <div class="text-[10px] font-black text-slate-400 uppercase">${m.d} · ${m.t}</div>
                        </td>
                        <td class="p-3 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <span class="text-xs font-semibold">${m.t1}</span>
                                <img src="https://flagcdn.com/w40/${teams[m.t1]}.png" class="flag-icon">
                            </div>
                        </td>
                        <td class="p-3">
                            <div class="flex items-center justify-center gap-1">
                                <input type="number" data-group="${group.id}" data-match="${i}" data-team="1" class="score-input w-9 h-9 text-center border-2 border-slate-100 rounded-lg font-bold text-emerald-600 outline-none" placeholder="-">
                                <input type="number" data-group="${group.id}" data-match="${i}" data-team="2" class="score-input w-9 h-9 text-center border-2 border-slate-100 rounded-lg font-bold text-emerald-600 outline-none" placeholder="-">
                            </div>
                        </td>
                        <td class="p-3 text-left">
                            <div class="flex items-center justify-start gap-2">
                                <img src="https://flagcdn.com/w40/${teams[m.t2]}.png" class="flag-icon">
                                <span class="text-xs font-semibold">${m.t2}</span>
                            </div>
                        </td>
                    </tr>
                `).join('');

                card.innerHTML = `
                    <div class="bg-slate-50/80 px-4 py-2 border-b flex justify-between items-center">
                        <h3 class="font-black text-slate-800 tracking-tight">${group.name}</h3>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">6 partidos</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <tbody>${matchesHtml}</tbody>
                        </table>
                    </div>
                    <div class="p-3 bg-slate-50/30 border-t">
                         <div id="table-${group.id}" class="grid grid-cols-4 gap-1 text-[10px] font-bold text-slate-600 text-center">
                            <!-- Tabla de posiciones calculada -->
                         </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            setupHonorRoll();
            load();
            updateAllTables();
        }

        function setupHonorRoll() {
            const allTeams = Object.keys(teams).sort();
            const selects = document.querySelectorAll('.h-select');
            selects.forEach(s => {
                s.innerHTML = `<option value="">Seleccionar equipo...</option>` + 
                    allTeams.map(t => `<option value="${t}">${t}</option>`).join('');
                s.addEventListener('change', save);
            });
        }

        function updateAllTables() {
            groupConfigs.forEach(group => {
                const stats = {};
                group.teams.forEach(t => stats[t] = { pts: 0, gf: 0, gc: 0 });

                const inputs = document.querySelectorAll(`input[data-group="${group.id}"]`);
                for (let i = 0; i < inputs.length; i += 2) {
                    const mIdx = inputs[i].dataset.match;
                    const match = group.matches[mIdx];
                    const g1 = parseInt(inputs[i].value);
                    const g2 = parseInt(inputs[i+1].value);

                    if (!isNaN(g1) && !isNaN(g2)) {
                        stats[match.t1].gf += g1; stats[match.t1].gc += g2;
                        stats[match.t2].gf += g2; stats[match.t2].gc += g1;
                        if (g1 > g2) stats[match.t1].pts += 3;
                        else if (g1 < g2) stats[match.t2].pts += 3;
                        else { stats[match.t1].pts += 1; stats[match.t2].pts += 1; }
                    }
                }

                const sorted = Object.keys(stats).sort((a,b) => {
                    const gdA = stats[a].gf - stats[a].gc;
                    const gdB = stats[b].gf - stats[b].gc;
                    return stats[b].pts - stats[a].pts || gdB - gdA || stats[b].gf - stats[a].gf;
                });

                const tableDiv = document.getElementById(`table-${group.id}`);
                tableDiv.innerHTML = sorted.map((t, idx) => `
                    <div class="bg-white p-1 rounded border ${idx < 2 ? 'border-emerald-200 shadow-sm' : 'border-slate-100 opacity-50'}">
                        <div class="truncate">${t}</div>
                        <div class="text-emerald-600">${stats[t].pts}P</div>
                    </div>
                `).join('');
            });
            updateProgress();
        }

        function updateProgress() {
            const inputs = document.querySelectorAll('.score-input');
            let filled = 0;
            for(let i=0; i<inputs.length; i+=2) {
                if(inputs[i].value !== "" && inputs[i+1].value !== "") {
                    filled++;
                    inputs[i].classList.add('input-filled');
                    inputs[i+1].classList.add('input-filled');
                } else {
                    inputs[i].classList.remove('input-filled');
                    inputs[i+1].classList.remove('input-filled');
                }
            }
            document.getElementById('progress-text').innerText = `${filled} / 72`;
        }

        function save() {
            const data = {
                name: document.getElementById('p-name').value,
                phone: document.getElementById('p-phone').value,
                honors: Array.from(document.querySelectorAll('.h-select')).map(s => s.value),
                scores: Array.from(document.querySelectorAll('.score-input')).map(i => ({
                    id: `${i.dataset.group}-${i.dataset.match}-${i.dataset.team}`,
                    val: i.value
                }))
            };
            localStorage.setItem('polla_2026_manual_data', JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem('polla_2026_manual_data');
            if(!raw) return;
            const data = JSON.parse(raw);
            document.getElementById('p-name').value = data.name || "";
            document.getElementById('p-phone').value = data.phone || "";
            data.honors?.forEach((v, i) => {
                const el = document.getElementById(`h-${i+1}`);
                if(el) el.value = v;
            });
            data.scores?.forEach(s => {
                const [gid, mid, tid] = s.id.split('-');
                const el = document.querySelector(`input[data-group="${gid}"][data-match="${mid}"][data-team="${tid}"]`);
                if(el) el.value = s.v || s.val;
            });
        }

        document.getElementById('pdf-btn').addEventListener('click', async () => {
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString();
            const opt = { 
                margin: 5, 
                filename: `Mundial2026_${document.getElementById('p-name').value || 'Polla'}.pdf`, 
                html2canvas: { scale: 2 }, 
                jsPDF: { format: 'a4', orientation: 'portrait' } 
            };
            await html2pdf().set(opt).from(document.getElementById('capture-area')).save();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm('¿Estás seguro de borrar todos tus pronósticos?')) {
                localStorage.removeItem('polla_2026_manual_data');
                location.reload();
            }
        });

        document.addEventListener('input', (e) => {
            if(e.target.classList.contains('score-input')) updateAllTables();
            save();
        });

        init();
    </script>
</body>
</html>
