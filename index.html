        }

        .match-row:nth-child(even) {
            background-color: #f8fafc;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .border-group-A { border-left: 8px solid #adb5bd; }
        .border-group-B { border-left: 8px solid #e03131; }

        .border-group-K { border-left: 8px solid #f06595; }
        .border-group-L { border-left: 8px solid #a61e4d; }

            height: 15px;
            object-fit: cover;
            border-radius: 2px;
            display: inline-block;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            vertical-align: middle;
        }

        .group-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .group-table {
            min-width: 500px;
        }

        .goal-input {

        }
        .goal-input:focus {

            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);

        @media print {
            .no-print { display: none !important; }

        function renderGroups() {
            const container = document.getElementById('groups-container');
            if (!container) return;
            container.innerHTML = '';

            worldCupData.forEach(group => {
                let matchesHtml = '';
                group.matches.forEach((match, idx) => {
                    const homeId = `goal_${group.id}_${idx}_home`;
                    const awayId = `goal_${group.id}_${idx}_away`;
                    matchesHtml += `
                        <tr class="match-row border-b border-slate-50 last:border-0 text-sm">
                            <td class="px-3 py-3 leading-tight">
                                <div class="font-bold text-slate-700">${match.date}</div>
                                <div class="text-[10px] text-slate-400 uppercase font-medium">${match.time} | ${match.jor}</div>
                            </td>
                            <td class="px-3 py-3 text-right font-medium text-slate-600">
                                <div class="flex items-center justify-end gap-2">
                                    <span class="truncate max-w-[100px] sm:max-w-none">${match.team1}</span>
                                    ${getFlagImg(match.team1)}
                                </div>
                            </td>
                            <td class="px-2 py-3">
                                <div class="flex items-center justify-center gap-1">
                                    <input type="number" min="0" placeholder="-" id="${homeId}" 
                                        class="goal-input w-10 h-10 text-center bg-white border border-slate-200 rounded font-bold text-emerald-600 focus:outline-none">
                                    <span class="text-slate-300 font-bold">-</span>
                                    <input type="number" min="0" placeholder="-" id="${awayId}" 
                                        class="goal-input w-10 h-10 text-center bg-white border border-slate-200 rounded font-bold text-emerald-600 focus:outline-none">
                                </div>
                            </td>
                            <td class="px-3 py-3 font-medium text-slate-600">
                                <div class="flex items-center justify-start gap-2">
                                    ${getFlagImg(match.team2)}
                                    <span class="truncate max-w-[100px] sm:max-w-none">${match.team2}</span>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                const groupHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${group.class}">
                        <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="font-black text-slate-800 text-xl tracking-tighter">${group.name}</h3>
                            <span class="text-[10px] bg-white border px-2 py-1 rounded font-bold text-slate-500 uppercase">Fase Inicial</span>
                        </div>
                        <div class="group-table-wrapper">
                            <table class="w-full text-left border-collapse group-table">
                                <thead class="bg-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                    <tr>
                                        <th class="px-3 py-2">Fecha / Hora</th>
                                        <th class="px-3 py-2 text-right">Local</th>
                                        <th class="px-2 py-2 text-center w-24">Goles</th>
                                        <th class="px-3 py-2">Visitante</th>
                                    </tr>
                                </thead>
                                <tbody>${matchesHtml}</tbody>
                            </table>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', groupHTML);
            });
        }

        function populateHonorRoll() {
            const allTeams = new Set();
            worldCupData.forEach(g => g.matches.forEach(m => { allTeams.add(m.team1); allTeams.add(m.team2); }));
            const sortedTeams = Array.from(allTeams).sort();
            const selects = document.querySelectorAll('.honor-select');
            selects.forEach(select => {
                select.innerHTML = '<option value="">Seleccionar equipo...</option>';
                sortedTeams.forEach(team => {
                    const option = document.createElement('option');
                    option.value = team;
                    option.textContent = team;
                    select.appendChild(option);
                });
            });
        }

        // ======================== FUNCIONES DE SISTEMA ========================

        function syncInputAttributes() {
            // Sincroniza el valor actual con el atributo 'value' para que html2canvas los capture en el PDF
            document.querySelectorAll('input').forEach(input => {
                input.setAttribute('value', input.value);
            });
            document.querySelectorAll('select').forEach(select => {
                const selected = select.options[select.selectedIndex]?.text || "No elegido";
                // Añadimos un pequeño marcador temporal para el PDF si es necesario
            });
        }

        function saveToLocalStorage() {
            const data = {
                participantName: document.getElementById('participant-name').value,
                participantPhone: document.getElementById('participant-phone').value,
                honor1: document.getElementById('honor-1').value,
                honor2: document.getElementById('honor-2').value,
                honor3: document.getElementById('honor-3').value,
                honor4: document.getElementById('honor-4').value,
                goals: {}
            };
            document.querySelectorAll('#groups-container input').forEach(input => {
                if (input.id) data.goals[input.id] = input.value;
            });
            localStorage.setItem('worldcup_v2_data', JSON.stringify(data));
            
            const status = document.getElementById('saveStatusText');
            if (status) {
                status.innerText = '✓ Pronósticos guardados';
                setTimeout(() => status.innerText = 'Guardado automático activo', 2000);
            }
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('worldcup_v2_data');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                if (data.participantName) document.getElementById('participant-name').value = data.participantName;
                if (data.participantPhone) document.getElementById('participant-phone').value = data.participantPhone;
                if (data.honor1) document.getElementById('honor-1').value = data.honor1;
                if (data.honor2) document.getElementById('honor-2').value = data.honor2;
                if (data.honor3) document.getElementById('honor-3').value = data.honor3;
                if (data.honor4) document.getElementById('honor-4').value = data.honor4;
                if (data.goals) {
                    Object.keys(data.goals).forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.value = data.goals[id];
                    });
                }
            } catch(e) { console.error("Error cargando datos:", e); }
        }

        // ======================== INICIALIZACIÓN ========================

        document.addEventListener('DOMContentLoaded', () => {
            renderGroups();
            populateHonorRoll();
            loadFromLocalStorage();

            // Guardado automático al escribir
            const mainContainer = document.getElementById('predictionsContainer');
            mainContainer.addEventListener('input', saveToLocalStorage);
            mainContainer.addEventListener('change', saveToLocalStorage);

            // Botón Limpiar
            document.getElementById('btn-clear-all').addEventListener('click', () => {
                if (confirm('⚠️ ¿Estás seguro de borrar todos tus pronósticos? Esta acción no se puede deshacer.')) {
                    localStorage.removeItem('worldcup_v2_data');
                    window.location.reload();
                }
            });

            // Botón PDF con corrección de "hoja en blanco"
            document.getElementById('btn-generate-pdf').addEventListener('click', async function() {
                const btn = this;
                const element = document.getElementById('predictionsContainer');
                
                // 1. Sincronizar valores actuales con atributos DOM
                syncInputAttributes();

                const rawName = document.getElementById('participant-name').value.trim() || 'Participante';
                const filename = `${rawName.replace(/\s+/g, '_')}_Mundial_2026.pdf`;

                btn.disabled = true;
                const originalText = btn.innerHTML;
                btn.innerHTML = '⏳ GENERANDO ARCHIVO...';

                const opt = {
                    margin: [10, 5, 10, 5],
                    filename: filename,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        logging: false,
                        scrollX: 0,
                        scrollY: 0
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                try {
                    await new Promise(resolve => setTimeout(resolve, 300)); // Pequeña espera para render
                    await html2pdf().set(opt).from(element).save();
                } catch (err) {
                    console.error(err);
                    alert("Error al generar el PDF. Por favor intenta de nuevo.");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });

            // Validaciones
            document.getElementById('participant-phone').addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
            document.getElementById('participant-name').addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '');
            });
        });
    </script>
</body>
</html>
